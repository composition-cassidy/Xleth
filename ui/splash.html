<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; img-src file: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0D0F13;
    overflow: hidden;
    user-select: none; -webkit-user-select: none;
    font-family: system-ui, -apple-system, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 300ms ease;
  }
  body.fade-out { opacity: 0; }
  #logo { max-width: 420px; max-height: 220px; object-fit: contain; margin-bottom: 28px; }
  #status { font-size: 13px; color: #4AE3D0; letter-spacing: 0.02em; height: 18px; text-align: center; }
  #progress-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 2px; background: transparent; overflow: hidden;
  }
  #progress-sweep {
    position: absolute; top: 0; height: 100%; width: 40%;
    background: rgba(74, 227, 208, 0.4);
    animation: sweep 1.6s ease-in-out infinite;
  }
  @keyframes sweep { 0% { left: -40%; } 100% { left: 100%; } }
</style>
</head>
<body>
  <img id="logo" src="" alt="" onerror="this.style.display='none'">
  <div id="status">Starting…</div>
  <div id="progress-bar"><div id="progress-sweep"></div></div>
  <script>
    const statusEl = document.getElementById('status');
    if (window.splashIpc) {
      window.splashIpc.on('splash:status', (_event, msg) => { statusEl.textContent = msg; });
    } else {
      const msgs = ['Initializing audio engine…','Registering codecs…','Starting compositor…','Loading workspace…'];
      let i = 0;
      const cycle = () => { statusEl.textContent = msgs[i++ % msgs.length]; setTimeout(cycle, 800); };
      setTimeout(cycle, 800);
    }
  </script>
</body>
</html>
