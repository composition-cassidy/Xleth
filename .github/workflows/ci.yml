# Xleth CI — builds all three layers on every PR and push to main.
#
#   native : CMake engine build (engine + scanner + editor-host + test exes),
#            then the Node-API bridge addon via cmake-js. Both must succeed.
#   ui     : Vite production build (must succeed) + vitest suite (reported,
#            but NON-BLOCKING for now — see the step comment below).
#
# Local reproduction of each step is documented in CONTRIBUTING.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Engine + bridge (MSVC x64)
    runs-on: windows-2022 # pinned: VS 2022 generator + bundled CMake 3.x are load-bearing
    timeout-minutes: 180 # first run builds FFmpeg from source; cached runs are much faster
    env:
      # Root CMakeLists.txt picks up the vcpkg toolchain from VCPKG_ROOT.
      # GitHub's Windows runners ship a vcpkg clone at C:\vcpkg.
      VCPKG_ROOT: C:\vcpkg
      # Store compiled vcpkg packages (FFmpeg, GLEW, GLFW) in the Actions
      # cache so only the first run on a cold cache pays the FFmpeg build.
      # If the cache backend is unavailable, vcpkg just builds from source.
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

    steps:
      - uses: actions/checkout@v4

      # The build requires the CMake 3.x line. The runner's default CMake is
      # 4.x, which breaks configuration of fetched dependencies that still
      # declare pre-3.5 minimums (same reason local builds use the
      # VS-bundled CMake — see CONTRIBUTING.md). Put Visual Studio's bundled
      # CMake first on PATH for this job and every later step (cmake-js
      # included).
      - name: Use Visual Studio's bundled CMake (3.x)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          $cmakeBin = Join-Path $vs 'Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin'
          if (-not (Test-Path (Join-Path $cmakeBin 'cmake.exe'))) {
            throw "VS-bundled CMake not found at $cmakeBin"
          }
          Add-Content $env:GITHUB_PATH $cmakeBin
          & (Join-Path $cmakeBin 'cmake.exe') --version

      # vcpkg's GitHub-Actions binary cache ("x-gha" above) needs the runner's
      # cache credentials exported as ordinary environment variables.
      - name: Export Actions cache credentials for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Mirrors `build.bat engine`. Configure installs the vcpkg manifest
      # (FFmpeg/GLEW/GLFW/nlohmann-json) into build/vcpkg_installed and
      # fetches JUCE, Rubber Band, WORLD, and xxHash via FetchContent.
      - name: Configure (CMake + vcpkg manifest)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build engine, scanner, editor-host, tests
        run: cmake --build build --config Release --parallel

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Mirrors `build.bat bridge`. The bridge's CMakeLists reuses the vcpkg
      # packages the engine configure step installed into build/vcpkg_installed,
      # so this must run after the engine build (same job, same workspace).
      - name: Install bridge deps
        working-directory: bridge
        run: npm ci

      - name: Build bridge addon (cmake-js)
        working-directory: bridge
        run: npx cmake-js compile --CDCMAKE_BUILD_TYPE=Release

      - name: Verify addon binary exists
        shell: pwsh
        run: |
          $addon = 'bridge\build\Release\xleth_native.node'
          if (-not (Test-Path $addon)) { throw "$addon was not produced" }
          Get-Item $addon | Format-List Name, Length

  ui:
    name: UI (Vite build + vitest)
    runs-on: windows-2022 # pinned to match the native job
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci

      # Gating check: the renderer must at least compile.
      - name: Vite production build
        run: npm run build

      # NON-BLOCKING for now: the suite has known pre-existing failures
      # (AUDIT.md §3.5). It runs on every PR so regressions are visible in
      # the logs, but a red result does not fail the workflow. Once the
      # suite is green (audit item Q12), delete the continue-on-error line
      # to make it a required check.
      - name: Vitest (non-blocking — known pre-existing failures)
        continue-on-error: true
        run: npm test
